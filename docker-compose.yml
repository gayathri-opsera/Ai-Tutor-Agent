# ──────────────────────────────────────────────────────────────────────────────
# AI Tutor Agent — Local Docker Compose
#
# Quick start:
#   cp .env.local .env          # fill in OPENAI_API_KEY
#   make up                     # start all services
#   make logs                   # follow logs
#   open http://localhost        # access the app
#
# With Kafka disabled (default — uses KAFKA_SYNC_MODE=true):
#   All events are dispatched in-process via LocalEventBus.
#
# With full Kafka:
#   make up-kafka               # also starts Kafka + Zookeeper
# ──────────────────────────────────────────────────────────────────────────────

x-service-defaults: &service-defaults
  restart: unless-stopped
  env_file: .env
  networks:
    - ai-tutor-net

x-python-healthcheck: &python-healthcheck
  interval: 15s
  timeout: 5s
  start_period: 40s
  retries: 3

# ──────────────────────────────────────────────────────────────────────────────
# INFRASTRUCTURE
# ──────────────────────────────────────────────────────────────────────────────
services:

  postgres:
    <<: *service-defaults
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ai_tutor
      POSTGRES_USER: ai_tutor
      POSTGRES_PASSWORD: ai_tutor_local_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./services/db/seeds:/docker-entrypoint-initdb.d/seeds:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_tutor"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    <<: *service-defaults
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  weaviate:
    <<: *service-defaults
    image: semitechnologies/weaviate:1.24.4
    ports:
      - "18080:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "false"
      AUTHENTICATION_APIKEY_ENABLED: "true"
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: "local-dev-key"
      AUTHENTICATION_APIKEY_USERS: "ai-tutor-service"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: node1
    volumes:
      - weaviate-data:/var/lib/weaviate
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/v1/.well-known/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  minio:
    <<: *service-defaults
    image: minio/minio:latest
    ports:
      - "9100:9000"
      - "9101:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # MinIO bucket initialiser (runs once then exits)
  minio-init:
    image: minio/mc:latest
    networks:
      - ai-tutor-net
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/ai-tutor-content &&
        echo 'MinIO bucket ready'
      "

  # Run Alembic migrations (runs once, then exits)
  db-migrate:
    image: python:3.13-slim
    networks:
      - ai-tutor-net
    env_file: .env
    environment:
      DATABASE_URL: postgresql://ai_tutor:ai_tutor_local_password@postgres:5432/ai_tutor
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ai_tutor
      DB_USER: ai_tutor
      DB_PASSWORD: ai_tutor_local_password
    command: >
      sh -c "pip install alembic psycopg2-binary sqlalchemy --quiet &&
             cd /migrations &&
             alembic upgrade head &&
             echo 'Migrations complete'"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/db:/migrations
    restart: "no"

# ──────────────────────────────────────────────────────────────────────────────
# BACKEND SERVICES
# ──────────────────────────────────────────────────────────────────────────────

  llm-gateway:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE: llm-gateway
        PORT: "8000"
    ports:
      - "18000:8000"
    environment:
      PORT: "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/internal/llm/health || exit 1"]
      <<: *python-healthcheck

  embedding-service:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE: embedding-service
        PORT: "8001"
    ports:
      - "8001:8001"
    environment:
      PORT: "8001"
    depends_on:
      llm-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/api/internal/embeddings/health || exit 1"]
      <<: *python-healthcheck

  rag-pipeline:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE: rag-pipeline
        PORT: "8002"
    ports:
      - "8002:8002"
    environment:
      PORT: "8002"
    depends_on:
      embedding-service:
        condition: service_healthy
      weaviate:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/health || exit 1"]
      <<: *python-healthcheck

  content-ingestion:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.content-ingestion
    ports:
      - "8003:8003"
    environment:
      PORT: "8003"
    depends_on:
      embedding-service:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8003/health || exit 1"]
      <<: *python-healthcheck

  chat-orchestrator:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE: chat-orchestrator
        PORT: "8004"
    ports:
      - "8004:8004"
    environment:
      PORT: "8004"
    depends_on:
      llm-gateway:
        condition: service_healthy
      rag-pipeline:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8004/health || exit 1"]
      <<: *python-healthcheck

  agent-reasoning:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE: agent-reasoning
        PORT: "8005"
    ports:
      - "8005:8005"
    environment:
      PORT: "8005"
    depends_on:
      rag-pipeline:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8005/health || exit 1"]
      <<: *python-healthcheck

  confidence-grader:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE: confidence-grader
        PORT: "8006"
    ports:
      - "8006:8006"
    environment:
      PORT: "8006"
    depends_on:
      llm-gateway:
        condition: service_healthy
      rag-pipeline:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8006/health || exit 1"]
      <<: *python-healthcheck

  content-management:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE: content-management
        PORT: "8007"
    ports:
      - "8007:8007"
    environment:
      PORT: "8007"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8007/health || exit 1"]
      <<: *python-healthcheck

  learner-profile:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE: learner-profile
        PORT: "8008"
    ports:
      - "8008:8008"
    environment:
      PORT: "8008"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8008/health || exit 1"]
      <<: *python-healthcheck

  admin-config:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE: admin-config
        PORT: "8009"
    ports:
      - "8009:8009"
    environment:
      PORT: "8009"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8009/health || exit 1"]
      <<: *python-healthcheck

  assessment:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE: assessment
        PORT: "8010"
    ports:
      - "8010:8010"
    environment:
      PORT: "8010"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8010/health || exit 1"]
      <<: *python-healthcheck

  analytics:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE: analytics
        PORT: "8011"
    ports:
      - "8011:8011"
    environment:
      PORT: "8011"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8011/health || exit 1"]
      <<: *python-healthcheck

  audit:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE: audit
        PORT: "8012"
    ports:
      - "8012:8012"
    environment:
      PORT: "8012"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8012/health || exit 1"]
      <<: *python-healthcheck

# ──────────────────────────────────────────────────────────────────────────────
# FRONTEND
# ──────────────────────────────────────────────────────────────────────────────

  frontend:
    <<: *service-defaults
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src              # hot-reload source files
      - ./frontend/vite.config.ts:/app/vite.config.ts  # live proxy config
    environment:
      VITE_API_BASE_URL: http://localhost
      VITE_KEYCLOAK_URL: http://localhost:8180
      VITE_KEYCLOAK_REALM: ai-tutor
      VITE_KEYCLOAK_CLIENT_ID: ai-tutor-frontend
    depends_on:
      chat-orchestrator:
        condition: service_healthy

# ──────────────────────────────────────────────────────────────────────────────
# API GATEWAY (Nginx)
# ──────────────────────────────────────────────────────────────────────────────

  nginx:
    <<: *service-defaults
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - llm-gateway
      - embedding-service
      - rag-pipeline
      - content-ingestion
      - chat-orchestrator
      - agent-reasoning
      - confidence-grader
      - content-management
      - learner-profile
      - admin-config
      - assessment
      - analytics
      - audit
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

# ──────────────────────────────────────────────────────────────────────────────
# VOLUMES & NETWORKS
# ──────────────────────────────────────────────────────────────────────────────

volumes:
  postgres-data:
  redis-data:
  weaviate-data:
  minio-data:

networks:
  ai-tutor-net:
    driver: bridge
