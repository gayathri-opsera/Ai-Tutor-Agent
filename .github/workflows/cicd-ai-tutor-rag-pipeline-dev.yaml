name: "CI/CD - ai-tutor rag-pipeline (dev)"

on:
  push:
    branches: [main]
    paths:
      - services/rag-pipeline/**
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "manual deploy"

permissions:
  contents: write
  security-events: write
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/shared-deploy.yaml
    secrets: inherit
    with:
      service: "rag-pipeline"
      port: "8003"
      ecr_repo: "opsera/ai-tutor-rag-pipeline"
      placeholder_key: "PLACEHOLDER_ECR_URI_RAG_PIPELINE"
      dockerfile_pattern: "service"
      contract_service_name: "rag-pipeline"
