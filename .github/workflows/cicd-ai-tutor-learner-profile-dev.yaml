name: "CI/CD - ai-tutor learner-profile (dev)"

on:
  push:
    branches: [main]
    paths:
      - services/learner-profile/**
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "manual deploy"

permissions:
  contents: read
  security-events: write
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/shared-deploy.yaml
    secrets: inherit
    with:
      service: "learner-profile"
      port: "8008"
      ecr_repo: "opsera/ai-tutor-learner-profile"
      placeholder_key: "PLACEHOLDER_ECR_URI_LEARNER_PROFILE"
      dockerfile_pattern: "service"
      contract_service_name: "learner-profile"
