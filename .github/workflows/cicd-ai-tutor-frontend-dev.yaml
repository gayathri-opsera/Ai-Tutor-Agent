name: "CI/CD - ai-tutor frontend (dev)"

on:
  push:
    branches: [main]
    paths:
      - frontend/**
      - .opsera-ai-tutor/Dockerfile.frontend
      - .opsera-ai-tutor/nginx.conf
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "manual deploy"

permissions:
  contents: write
  security-events: write
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/shared-deploy.yaml
    secrets: inherit
    with:
      service: "frontend"
      port: "8000"
      ecr_repo: "opsera/ai-tutor-frontend"
      placeholder_key: "PLACEHOLDER_ECR_URI_"
      dockerfile_pattern: "frontend"
      service_path: "frontend"
