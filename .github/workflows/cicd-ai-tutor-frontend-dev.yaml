name: "CI/CD - ai-tutor frontend (dev)"

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.opsera-ai-tutor/Dockerfile.frontend'
      - '.opsera-ai-tutor/nginx.conf'
      - '.github/workflows/cicd-ai-tutor-frontend-dev.yaml'

  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'manual deploy'

env:
  TENANT: opsera
  APP_NAME: ai-tutor
  SERVICE: frontend
  AWS_REGION: us-west-2
  HUB_CLUSTER: argocd-usw2
  SPOKE_CLUSTER: opsera-usw2-np
  NAMESPACE: opsera-ai-tutor-dev
  ECR_REPO: opsera/ai-tutor-frontend

jobs:
  # Stage 1: Secret scan (warn-only — never blocks build)
  security-scan:
    name: "01 - Security Scan"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

  # Stage 2: Build image locally (no push yet)
  build-image:
    name: "02 - Build Image"
    runs-on: ubuntu-latest
    needs: [security-scan]
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Image Tag
        id: tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          TAG="dev-${SHORT_SHA}-${TIMESTAMP}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${TAG}"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ECR URI
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}"
          echo "uri=${ECR_URI}" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        run: |
          docker build \
            -f .opsera-ai-tutor/Dockerfile.frontend \
            -t ${{ steps.ecr.outputs.uri }}:${{ steps.tag.outputs.tag }} \
            .
          echo "✅ Image built: ${{ steps.ecr.outputs.uri }}:${{ steps.tag.outputs.tag }}"

      - name: Save Image for Scan
        run: |
          docker save ${{ steps.ecr.outputs.uri }}:${{ steps.tag.outputs.tag }} \
            -o /tmp/frontend-image.tar

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: /tmp/frontend-image.tar
          retention-days: 1

  # Stage 3: Vulnerability scan (warn-only)
  grype-scan:
    name: "03 - Grype Vulnerability Scan"
    runs-on: ubuntu-latest
    needs: [build-image]
    continue-on-error: true
    steps:
      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-image
          path: /tmp

      - name: Load Image
        run: docker load -i /tmp/frontend-image.tar

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ECR URI
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "uri=${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}" >> $GITHUB_OUTPUT

      - name: Run Grype Scan
        uses: anchore/scan-action@v3
        with:
          image: ${{ steps.ecr.outputs.uri }}:${{ needs.build-image.outputs.image_tag }}
          fail-build: false
          severity-cutoff: critical
          output-format: sarif
        id: scan

      - name: Upload SARIF Report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
        continue-on-error: true

  # Stage 4: Push to ECR (runs if build succeeded)
  push-to-ecr:
    name: "04 - Push to ECR"
    runs-on: ubuntu-latest
    needs: [build-image, grype-scan]
    if: always() && needs.build-image.result == 'success'
    outputs:
      ecr_uri: ${{ steps.push.outputs.ecr_uri }}
    steps:
      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-image
          path: /tmp

      - name: Load Image
        run: docker load -i /tmp/frontend-image.tar

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Push to ECR
        id: push
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}"
          IMAGE_TAG="${{ needs.build-image.outputs.image_tag }}"

          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login --username AWS --password-stdin \
            "${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"

          docker push "${ECR_URI}:${IMAGE_TAG}"
          echo "ecr_uri=${ECR_URI}" >> $GITHUB_OUTPUT
          echo "✅ Pushed ${ECR_URI}:${IMAGE_TAG}"

  # Stage 5: Update kustomization manifests
  update-manifests:
    name: "05 - Update Manifests"
    runs-on: ubuntu-latest
    needs: [build-image, push-to-ecr]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Write Service Image Patch
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}"
          IMAGE_TAG="${{ needs.build-image.outputs.image_tag }}"
          SVC="${{ env.SERVICE }}"
          PATCH_FILE=".opsera-ai-tutor/k8s/overlays/dev/${SVC}-image.yaml"

          echo "apiVersion: apps/v1"                           >  "${PATCH_FILE}"
          echo "kind: Deployment"                              >> "${PATCH_FILE}"
          echo "metadata:"                                     >> "${PATCH_FILE}"
          echo "  name: ${SVC}"                               >> "${PATCH_FILE}"
          echo "spec:"                                         >> "${PATCH_FILE}"
          echo "  template:"                                   >> "${PATCH_FILE}"
          echo "    spec:"                                     >> "${PATCH_FILE}"
          echo "      containers:"                             >> "${PATCH_FILE}"
          echo "        - name: ${SVC}"                       >> "${PATCH_FILE}"
          echo "          image: ${ECR_URI}:${IMAGE_TAG}"     >> "${PATCH_FILE}"

          echo "✅ Updated ${PATCH_FILE} → ${ECR_URI}:${IMAGE_TAG}"

      - name: Validate Kustomize Build
        run: |
          kubectl kustomize .opsera-ai-tutor/k8s/overlays/dev > /dev/null \
            && echo "✅ Kustomize validation passed" \
            || (echo "❌ Kustomize build failed"; exit 1)

      - name: Commit and Push Service Patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          PATCH_FILE=".opsera-ai-tutor/k8s/overlays/dev/${{ env.SERVICE }}-image.yaml"

          if git diff --quiet "${PATCH_FILE}"; then
            echo "No changes to commit"
            exit 0
          fi

          git add "${PATCH_FILE}"
          git commit -m "chore(deploy): update ${{ env.SERVICE }} to ${{ needs.build-image.outputs.image_tag }} [skip ci]"

          # Retry push — conflicts are now impossible since each service owns its file
          for i in 1 2 3; do
            if git push origin main; then
              echo "✅ Pushed manifest update"
              exit 0
            fi
            echo "Push conflict, pulling latest... (${i}/3)"
            git pull --rebase origin main
            sleep 2
          done
          exit 1
  create-argocd-app:
    name: "06 - Create ArgoCD Application"
    runs-on: ubuntu-latest
    needs: [update-manifests]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Setup Hub Kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Apply ArgoCD Application
        run: |
          kubectl apply -f .opsera-ai-tutor/argocd/dev/application.yaml
          echo "✅ ArgoCD application opsera-ai-tutor-dev created/updated"

  # Stage 7 & 8: Refresh ECR secret on spoke + ArgoCD sync (parallel)
  refresh-ecr-secret:
    name: "07 - Refresh ECR Secret"
    runs-on: ubuntu-latest
    needs: [create-argocd-app]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Setup Spoke Kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Refresh ECR Image Pull Secret
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          ECR_PASSWORD=$(aws ecr get-login-password --region ${{ env.AWS_REGION }})

          kubectl create secret docker-registry ecr-registry-secret \
            --namespace=${{ env.NAMESPACE }} \
            --docker-server="${ECR_REGISTRY}" \
            --docker-username=AWS \
            --docker-password="${ECR_PASSWORD}" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "✅ ECR pull secret refreshed in ${{ env.NAMESPACE }}"

  argocd-sync:
    name: "08 - ArgoCD Hard Refresh and Sync"
    runs-on: ubuntu-latest
    needs: [create-argocd-app]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Setup Hub Kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: ArgoCD Hard Refresh
        run: |
          APP="opsera-ai-tutor-dev"
          kubectl patch app ${APP} -n argocd --type merge \
            -p '{"metadata":{"annotations":{"argocd.argoproj.io/refresh":"hard"}}}'
          echo "✅ Hard refresh triggered"
          sleep 5

      - name: Trigger ArgoCD Sync
        run: |
          APP="opsera-ai-tutor-dev"
          kubectl patch app ${APP} -n argocd --type merge \
            -p '{"operation":{"initiatedBy":{"username":"github-actions"},"sync":{"revision":"HEAD"}}}'
          echo "✅ Sync triggered"

      - name: Wait for Sync to Complete
        run: |
          APP="opsera-ai-tutor-dev"
          for i in $(seq 1 60); do
            PHASE=$(kubectl get app ${APP} -n argocd \
              -o jsonpath='{.status.operationState.phase}' 2>/dev/null || echo "Unknown")
            HEALTH=$(kubectl get app ${APP} -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")
            echo "[$i/60] Phase: ${PHASE}, Health: ${HEALTH}"
            if [ "${PHASE}" = "Succeeded" ] && [ "${HEALTH}" = "Healthy" ]; then
              echo "✅ ArgoCD sync succeeded"
              exit 0
            fi
            sleep 10
          done
          echo "⚠️ Sync did not complete in 10 minutes"
          kubectl get app ${APP} -n argocd -o yaml
          exit 1

  # Stage 9: Verify deployment on spoke
  verify-deployment:
    name: "09 - Verify Deployment"
    runs-on: ubuntu-latest
    needs: [refresh-ecr-secret, argocd-sync]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Setup Spoke Kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Wait for Frontend Deployment
        run: |
          for i in $(seq 1 60); do
            if kubectl get deployment frontend -n ${{ env.NAMESPACE }} &>/dev/null; then
              echo "✅ Deployment exists"
              break
            fi
            echo "⏳ Waiting for ArgoCD to create deployment... ($i/60)"
            sleep 5
          done

      - name: Verify Deployment Ready
        run: |
          kubectl wait --for=condition=available --timeout=300s \
            deployment/frontend -n ${{ env.NAMESPACE }}
          echo "✅ Frontend deployment is available"

      - name: Show Status
        run: |
          kubectl get pods -n ${{ env.NAMESPACE }} -l app=frontend -o wide
          RUNNING=$(kubectl get pods -n ${{ env.NAMESPACE }} -l app=frontend \
            --field-selector=status.phase=Running -o name | wc -l)
          echo "✅ ${RUNNING} frontend pod(s) running"
          echo "🌐 URL: https://ai-tutor-dev.agent.opsera.dev"

  # Stage 10: Deployment landscape (ABSOLUTE LAST)
  deployment-landscape:
    name: "10 - Deployment Landscape"
    runs-on: ubuntu-latest
    needs: [verify-deployment]
    if: success()
    steps:
      - name: Deployment Summary
        run: |
          echo "================================================="
          echo " DEPLOYMENT COMPLETE"
          echo "================================================="
          echo " Service:    ai-tutor / frontend"
          echo " Environment: dev"
          echo " Namespace:  opsera-ai-tutor-dev"
          echo " Image Tag:  ${{ needs.build-image.outputs.image_tag }}"
          echo " URL:        https://ai-tutor-dev.agent.opsera.dev"
          echo "================================================="
