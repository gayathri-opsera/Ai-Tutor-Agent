name: "CI/CD - ai-tutor content-management (dev)"

on:
  push:
    branches: [main]
    paths:
      - services/content-management/**
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "manual deploy"

permissions:
  contents: write
  security-events: write
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/shared-deploy.yaml
    secrets: inherit
    with:
      service: "content-management"
      port: "8007"
      ecr_repo: "opsera/ai-tutor-content-management"
      placeholder_key: "PLACEHOLDER_ECR_URI_CONTENT_MANAGEMENT"
      dockerfile_pattern: "service"
      contract_service_name: "content-management"
