name: "CI/CD - ai-tutor agent-reasoning (dev)"

on:
  push:
    branches: [main]
    paths:
      - services/agent-reasoning/**
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "manual deploy"

permissions:
  contents: read
  security-events: write
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/shared-deploy.yaml
    secrets: inherit
    with:
      service: "agent-reasoning"
      port: "8005"
      ecr_repo: "opsera/ai-tutor-agent-reasoning"
      placeholder_key: "PLACEHOLDER_ECR_URI_AGENT_REASONING"
      dockerfile_pattern: "service"
      contract_service_name: "agent-reasoning"
