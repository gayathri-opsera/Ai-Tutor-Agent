name: "CI/CD - ai-tutor admin-config (dev)"

on:
  push:
    branches: [main]
    paths:
      - services/admin-config/**
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "manual deploy"

permissions:
  contents: write
  security-events: write
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/shared-deploy.yaml
    secrets: inherit
    with:
      service: "admin-config"
      port: "8009"
      ecr_repo: "opsera/ai-tutor-admin-config"
      placeholder_key: "PLACEHOLDER_ECR_URI_ADMIN_CONFIG"
      dockerfile_pattern: "service"
      contract_service_name: "admin-config"
