name: "CI/CD - ai-tutor assessment (dev)"

on:
  push:
    branches: [main]
    paths:
      - services/assessment/**
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "manual deploy"

permissions:
  contents: write
  security-events: write
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/shared-deploy.yaml
    secrets: inherit
    with:
      service: "assessment"
      port: "8010"
      ecr_repo: "opsera/ai-tutor-assessment"
      placeholder_key: "PLACEHOLDER_ECR_URI_ASSESSMENT"
      dockerfile_pattern: "service"
      contract_service_name: "assessment"
