name: "CI/CD - ai-tutor chat-orchestrator (dev)"

on:
  push:
    branches: [main]
    paths:
      - services/chat-orchestrator/**
      - Dockerfile.service
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "manual deploy"

jobs:
  deploy:
    uses: ./.github/workflows/shared-deploy.yaml
    secrets: inherit
    with:
      service: "chat-orchestrator"
      port: "8004"
      ecr_repo: "opsera/ai-tutor-chat-orchestrator"
      placeholder_key: "PLACEHOLDER_ECR_URI_CHAT_ORCHESTRATOR"
      dockerfile_pattern: "service"
      contract_service_name: "chat-orchestrator"
