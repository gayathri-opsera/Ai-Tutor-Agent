name: "CI/CD - ai-tutor llm-gateway (dev)"

on:
  push:
    branches: [main]
    paths:
      - services/llm-gateway/**
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "manual deploy"

jobs:
  deploy:
    uses: ./.github/workflows/shared-deploy.yaml
    secrets: inherit
    with:
      service: "llm-gateway"
      port: "8001"
      ecr_repo: "opsera/ai-tutor-llm-gateway"
      placeholder_key: "PLACEHOLDER_ECR_URI_LLM_GATEWAY"
      dockerfile_pattern: "service"
      contract_service_name: "llm-gateway"
