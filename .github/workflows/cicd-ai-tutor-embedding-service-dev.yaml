name: "CI/CD - ai-tutor embedding-service (dev)"

on:
  push:
    branches: [main]
    paths:
      - services/embedding-service/**
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "manual deploy"

permissions:
  contents: write
  security-events: write
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/shared-deploy.yaml
    secrets: inherit
    with:
      service: "embedding-service"
      port: "8002"
      ecr_repo: "opsera/ai-tutor-embedding-service"
      placeholder_key: "PLACEHOLDER_ECR_URI_EMBEDDING_SERVICE"
      dockerfile_pattern: "service"
      contract_service_name: "embedding-service"
