name: "CI/CD - ai-tutor confidence-grader (dev)"

on:
  push:
    branches: [main]
    paths:
      - services/confidence-grader/**
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "manual deploy"

jobs:
  deploy:
    uses: ./.github/workflows/shared-deploy.yaml
    secrets: inherit
    with:
      service: "confidence-grader"
      port: "8006"
      ecr_repo: "opsera/ai-tutor-confidence-grader"
      placeholder_key: "PLACEHOLDER_ECR_URI_CONFIDENCE_GRADER"
      dockerfile_pattern: "service"
      contract_service_name: "confidence-grader"
