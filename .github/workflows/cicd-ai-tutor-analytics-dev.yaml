name: "CI/CD - ai-tutor analytics (dev)"

on:
  push:
    branches: [main]
    paths:
      - services/analytics/**
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "manual deploy"

permissions:
  contents: read
  security-events: write
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/shared-deploy.yaml
    secrets: inherit
    with:
      service: "analytics"
      port: "8011"
      ecr_repo: "opsera/ai-tutor-analytics"
      placeholder_key: "PLACEHOLDER_ECR_URI_ANALYTICS"
      dockerfile_pattern: "service"
      contract_service_name: "analytics"
