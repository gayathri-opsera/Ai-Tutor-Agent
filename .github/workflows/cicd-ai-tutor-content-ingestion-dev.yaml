name: "CI/CD - ai-tutor content-ingestion (dev)"

on:
  push:
    branches: [main]
    paths:
      - services/content-ingestion/**
      - Dockerfile.content-ingestion
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "manual deploy"

permissions:
  contents: write
  security-events: write
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/shared-deploy.yaml
    secrets: inherit
    with:
      service: "content-ingestion"
      port: "8003"
      ecr_repo: "opsera/ai-tutor-content-ingestion"
      placeholder_key: "PLACEHOLDER_ECR_URI_CONTENT_INGESTION"
      dockerfile_pattern: "ingestion"
      service_path: "services/content-ingestion"
      contract_service_name: "content-ingestion"
