upstream llm_gateway       { server llm-gateway:8000; }
upstream embedding         { server embedding-service:8001; }
upstream rag_pipeline      { server rag-pipeline:8002; }
upstream content_ingestion { server content-ingestion:8003; }
upstream chat_orchestrator { server chat-orchestrator:8004; }
upstream agent_reasoning   { server agent-reasoning:8005; }
upstream confidence_grader { server confidence-grader:8006; }
upstream content_mgmt      { server content-management:8007; }
upstream learner_profile   { server learner-profile:8008; }
upstream admin_config      { server admin-config:8009; }
upstream assessment        { server assessment:8010; }
upstream analytics         { server analytics:8011; }
upstream audit             { server audit:8012; }

# Rate limiting zone: 60 req/min per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

server {
    listen 80;
    server_name localhost;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # ── CORS (allow Vite dev server and same-origin) ──────────────────────────
    add_header Access-Control-Allow-Origin  "$http_origin" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Request-ID" always;
    add_header Access-Control-Allow-Credentials "true" always;

    # Pre-flight requests
    if ($request_method = OPTIONS) {
        return 204;
    }

    # ── LLM Gateway ──────────────────────────────────────────────────────────
    location /api/internal/llm/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://llm_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 180s;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # ── Embedding Service ─────────────────────────────────────────────────────
    location /api/internal/embeddings/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://embedding;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # ── RAG Pipeline ──────────────────────────────────────────────────────────
    location /api/internal/rag/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://rag_pipeline;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # ── Confidence Grader ─────────────────────────────────────────────────────
    location /api/internal/grader/ {
        proxy_pass http://confidence_grader;
        proxy_set_header Host $host;
    }

    # ── Agent Reasoning ───────────────────────────────────────────────────────
    location /api/internal/agent/ {
        proxy_pass http://agent_reasoning;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    # ── Chat Orchestrator (SSE streaming) ─────────────────────────────────────
    location /api/v1/chat/ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://chat_orchestrator;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # ── Content Ingestion ─────────────────────────────────────────────────────
    location /api/v1/content/ {
        limit_req zone=api_limit burst=5 nodelay;
        proxy_pass http://content_ingestion;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 50m;
        proxy_read_timeout 120s;
    }

    # ── Knowledge Bases — rewrite frontend path → content-mgmt internal path ──
    # e.g. GET /api/v1/knowledge-bases/            → /api/v1/content-mgmt/knowledge-bases/
    #      GET /api/v1/knowledge-bases/{id}         → /api/v1/content-mgmt/knowledge-bases/{id}
    #      GET /api/v1/knowledge-bases/{id}/documents → /api/v1/content-mgmt/knowledge-bases/{id}/documents
    location ~ ^/api/v1/knowledge-bases(/.*)? {
        rewrite ^/api/v1/knowledge-bases(/.*)? /api/v1/content-mgmt/knowledge-bases$1 break;
        proxy_pass http://content_mgmt;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # ── Content-mgmt direct access ────────────────────────────────────────────
    location /api/v1/content-mgmt/ {
        proxy_pass http://content_mgmt;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # ── Learner Profile ───────────────────────────────────────────────────────
    location /api/v1/learner/ {
        proxy_pass http://learner_profile;
        proxy_set_header Host $host;
    }

    # ── Admin Config ──────────────────────────────────────────────────────────
    location /api/v1/admin/ {
        proxy_pass http://admin_config;
        proxy_set_header Host $host;
    }

    # ── Assessment ────────────────────────────────────────────────────────────
    location /api/v1/assessments/ {
        proxy_pass http://assessment;
        proxy_set_header Host $host;
    }

    # ── Analytics ─────────────────────────────────────────────────────────────
    location /api/v1/analytics/ {
        proxy_pass http://analytics;
        proxy_set_header Host $host;
    }

    # ── Audit Logs ────────────────────────────────────────────────────────────
    location /api/v1/audit/ {
        proxy_pass http://audit;
        proxy_set_header Host $host;
    }

    # ── Health aggregator ─────────────────────────────────────────────────────
    location /health {
        return 200 '{"status":"ok","gateway":"nginx"}';
        add_header Content-Type application/json;
    }

    # ── Frontend (React SPA) — must be last ───────────────────────────────────
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;
    }
}
