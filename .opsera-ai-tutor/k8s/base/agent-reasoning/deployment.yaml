apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-reasoning
  labels:
    app.kubernetes.io/name: ai-tutor
    app.kubernetes.io/component: agent-reasoning
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-reasoning
  template:
    metadata:
      labels:
        app: agent-reasoning
        app.kubernetes.io/name: ai-tutor
        app.kubernetes.io/component: agent-reasoning
    spec:
      serviceAccountName: ai-tutor
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: agent-reasoning
          image: PLACEHOLDER_ECR_URI_AGENT_REASONING
          ports:
            - containerPort: 8005
          envFrom:
            - configMapRef:
                name: ai-tutor-config
            - secretRef:
                name: ai-tutor-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 30
            periodSeconds: 30
