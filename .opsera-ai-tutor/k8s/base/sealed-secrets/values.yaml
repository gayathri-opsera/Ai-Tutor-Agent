# Sealed Secrets controller Helm values
# Chart: sealed-secrets v2.16.2 / Controller v0.27.1
# https://github.com/bitnami-labs/sealed-secrets/tree/main/helm/sealed-secrets

# Deploy controller into kube-system to match default kubeseal cert-fetch path.
# The controller creates a cluster-scoped TLS keypair used to encrypt SealedSecret resources.

fullnameOverride: sealed-secrets-controller

# Image pinned to controller v0.27.1 for reproducible deployments.
image:
  tag: "v0.27.1"

# Expose metrics endpoint for Prometheus scraping.
metrics:
  serviceMonitor:
    enabled: false   # Set true when Prometheus Operator is deployed

# Resource limits for the controller pod.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# Allow the controller to operate on all namespaces.
# Set to a specific namespace list to restrict scope if needed.
# namespaceScope: "opsera-ai-tutor-dev"

# Key rotation: the controller auto-rotates the sealing key every 30 days.
# Old keys are retained to allow decryption of previously sealed secrets.
keyRenewPeriod: "720h"

# Retain previous key versions to avoid decryption failures after key rotation.
maxStaleness: 5
