apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Sealed Secrets controller — pre-rendered from Helm chart v2.16.2 (controller v0.27.1)
# Chart: sealed-secrets | Repo: https://bitnami-labs.github.io/sealed-secrets
#
# To upgrade: download new release manifest from GitHub and replace controller.yaml:
#   curl -sL https://github.com/bitnami-labs/sealed-secrets/releases/download/vX.Y.Z/controller.yaml \
#     > controller.yaml
# Then commit with the version bump.
#
# Using static YAML instead of helmCharts to avoid live Helm repo pulls in CI
# (Helm repo returns 404 in kubectl kustomize --enable-helm environments).

resources:
  - controller.yaml
