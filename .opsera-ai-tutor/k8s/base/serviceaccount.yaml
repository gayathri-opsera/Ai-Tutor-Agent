apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-tutor
  labels:
    app.kubernetes.io/name: ai-tutor
    app.kubernetes.io/managed-by: argocd
    tenant: opsera
# ECR pull secret injected into every pod using this ServiceAccount.
# The secret is refreshed by the CI/CD pipeline before each ArgoCD sync
# because ECR tokens expire every 12 hours.
imagePullSecrets:
  - name: ecr-registry-secret
