apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-gateway
  labels:
    app.kubernetes.io/name: ai-tutor
    app.kubernetes.io/component: llm-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-gateway
  template:
    metadata:
      labels:
        app: llm-gateway
        app.kubernetes.io/name: ai-tutor
        app.kubernetes.io/component: llm-gateway
    spec:
      serviceAccountName: ai-tutor
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: llm-gateway
          image: PLACEHOLDER_ECR_URI_LLM_GATEWAY
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: ai-tutor-config
            - secretRef:
                name: ai-tutor-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 30
