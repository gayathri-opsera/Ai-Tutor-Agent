apiVersion: apps/v1
kind: Deployment
metadata:
  name: content-management
  labels:
    app.kubernetes.io/name: ai-tutor
    app.kubernetes.io/component: content-management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: content-management
  template:
    metadata:
      labels:
        app: content-management
        app.kubernetes.io/name: ai-tutor
        app.kubernetes.io/component: content-management
    spec:
      serviceAccountName: ai-tutor
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: content-management
          image: PLACEHOLDER_ECR_URI_CONTENT_MANAGEMENT
          ports:
            - containerPort: 8007
          envFrom:
            - configMapRef:
                name: ai-tutor-config
            - secretRef:
                name: ai-tutor-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8007
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8007
            initialDelaySeconds: 30
            periodSeconds: 30
