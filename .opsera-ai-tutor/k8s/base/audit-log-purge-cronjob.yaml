apiVersion: batch/v1
kind: CronJob
metadata:
  name: audit-log-purge
  labels:
    app.kubernetes.io/name: ai-tutor
    app.kubernetes.io/component: audit-purge
spec:
  schedule: "0 3 * * *"   # 03:00 UTC daily
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: audit-purge
              image: python:3.13-slim
              command: ["python", "/scripts/purge_audit_logs.py"]
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: postgres-credentials
                      key: purge-dsn
          volumes:
            - name: scripts
              configMap:
                name: audit-purge-scripts
