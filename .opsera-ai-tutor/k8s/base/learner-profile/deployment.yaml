apiVersion: apps/v1
kind: Deployment
metadata:
  name: learner-profile
  labels:
    app.kubernetes.io/name: ai-tutor
    app.kubernetes.io/component: learner-profile
spec:
  replicas: 1
  selector:
    matchLabels:
      app: learner-profile
  template:
    metadata:
      labels:
        app: learner-profile
        app.kubernetes.io/name: ai-tutor
        app.kubernetes.io/component: learner-profile
    spec:
      serviceAccountName: ai-tutor
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: learner-profile
          image: PLACEHOLDER_ECR_URI_LEARNER_PROFILE
          ports:
            - containerPort: 8008
          envFrom:
            - configMapRef:
                name: ai-tutor-config
            - secretRef:
                name: ai-tutor-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8008
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8008
            initialDelaySeconds: 30
            periodSeconds: 30
