apiVersion: batch/v1
kind: CronJob
metadata:
  name: assessment-results-purge
  labels:
    app.kubernetes.io/name: ai-tutor
    app.kubernetes.io/component: assessment-purge
spec:
  schedule: "30 3 * * *"   # 03:30 UTC daily
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: assessment-purge
              image: python:3.13-slim
              command: ["python", "/scripts/purge_assessment_results.py"]
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: postgres-credentials
                      key: app-dsn
          volumes:
            - name: scripts
              configMap:
                name: assessment-purge-scripts
