apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-service
  labels:
    app.kubernetes.io/name: ai-tutor
    app.kubernetes.io/component: embedding-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embedding-service
  template:
    metadata:
      labels:
        app: embedding-service
        app.kubernetes.io/name: ai-tutor
        app.kubernetes.io/component: embedding-service
    spec:
      serviceAccountName: ai-tutor
      securityContext: {}
      containers:
        - name: embedding-service
          image: PLACEHOLDER_ECR_URI_EMBEDDING_SERVICE
          ports:
            - containerPort: 8002
          env:
            - name: TORCHINDUCTOR_CACHE_DIR
              value: /tmp/torch_cache
            - name: HOME
              value: /tmp
          envFrom:
            - configMapRef:
                name: ai-tutor-config
            - secretRef:
                name: ai-tutor-secrets
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 30
            periodSeconds: 30
