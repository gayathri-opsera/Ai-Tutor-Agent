apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# SealedSecret CRDs for the ai-tutor platform.
# These encrypted manifests are synced by ArgoCD and decrypted at runtime
# by the Sealed Secrets controller running in kube-system.
#
# BEFORE DEPLOYING: Replace PLACEHOLDER_SEAL_WITH_KUBESEAL values in
# ai-tutor-sealed-secret.yaml with real kubeseal ciphertext.
# See .opsera-ai-tutor/docs/RUNBOOK-sealed-secrets.md for instructions.

# ai-tutor-secrets is created externally by the bootstrap workflow
# (00-bootstrap-infrastructure.yaml) via --from-literal with real credentials.
# It is NOT managed by ArgoCD to avoid overwriting live secret values.
# The SealedSecret CRD was removed because its placeholder ciphertext
# caused SealedSecrets controller failures and ArgoCD health degradation.
resources: []
