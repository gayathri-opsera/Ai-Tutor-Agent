# ai-tutor-sealed-secret.yaml
#
# SealedSecret CRD for the ai-tutor-secrets Kubernetes Secret.
#
# IMPORTANT: The encryptedData values below are PLACEHOLDER STRINGS.
# They must be replaced with real kubeseal-encrypted values before deploying
# to any cluster. See .opsera-ai-tutor/docs/RUNBOOK-sealed-secrets.md for
# step-by-step sealing instructions.
#
# To generate real encrypted values for a given environment, run:
#   kubeseal --format yaml \
#     --controller-name=sealed-secrets-controller \
#     --controller-namespace=kube-system \
#     < secret-template.yaml > ai-tutor-sealed-secret.yaml
#
# This file is committed to Git for GitOps/ArgoCD management.
# Actual secret values are NEVER stored here — only encrypted ciphertext.
# The Sealed Secrets controller decrypts at runtime using its private key.
#
# Secret keys managed by this SealedSecret:
#   AI/LLM providers : OPENAI_API_KEY, ANTHROPIC_API_KEY, GROQ_API_KEY,
#                      AZURE_OPENAI_API_KEY, AZURE_OPENAI_ENDPOINT
#   Database         : DB_HOST, DB_PASSWORD, DATABASE_URL
#   Cache            : REDIS_URL
#   Vector store     : WEAVIATE_URL, WEAVIATE_API_KEY
#   Auth / Identity  : JWT_SECRET, KEYCLOAK_CLIENT_SECRET, KEYCLOAK_ADMIN_PASSWORD
#   Object storage   : S3_ACCESS_KEY, S3_SECRET_KEY, S3_ENDPOINT
#
# Related: REQ-008 — Secrets management overhaul (SOX/FFIEC compliance)
# ForgeScore dimension: trust_boundaries (target ≥ 80)

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: ai-tutor-secrets
  # Namespace is embedded in the ciphertext by kubeseal.
  # Do NOT change this without re-sealing all encrypted values.
  namespace: opsera-ai-tutor-dev
  annotations:
    # Track which controller version sealed this secret.
    sealedsecrets.bitnami.com/controller-version: "v0.27.1"
    # Annotate sealed-at timestamp for audit purposes (update when re-sealing).
    sealedsecrets.bitnami.com/sealed-at: "REPLACE_WITH_ISO8601_TIMESTAMP"
spec:
  # encryptedData values are RSA-OAEP + AES-256-GCM encrypted by kubeseal.
  # Each value is base64-encoded ciphertext — namespace and name are bound into
  # the encryption, so ciphertext cannot be replayed to a different secret name
  # or namespace.
  encryptedData:
    # AI Provider Keys
    OPENAI_API_KEY: PLACEHOLDER_SEAL_WITH_KUBESEAL
    ANTHROPIC_API_KEY: PLACEHOLDER_SEAL_WITH_KUBESEAL
    GROQ_API_KEY: PLACEHOLDER_SEAL_WITH_KUBESEAL
    AZURE_OPENAI_API_KEY: PLACEHOLDER_SEAL_WITH_KUBESEAL
    AZURE_OPENAI_ENDPOINT: PLACEHOLDER_SEAL_WITH_KUBESEAL

    # Database
    DB_HOST: PLACEHOLDER_SEAL_WITH_KUBESEAL
    DB_PASSWORD: PLACEHOLDER_SEAL_WITH_KUBESEAL
    DATABASE_URL: PLACEHOLDER_SEAL_WITH_KUBESEAL

    # Cache
    REDIS_URL: PLACEHOLDER_SEAL_WITH_KUBESEAL

    # Vector Store
    WEAVIATE_URL: PLACEHOLDER_SEAL_WITH_KUBESEAL
    WEAVIATE_API_KEY: PLACEHOLDER_SEAL_WITH_KUBESEAL

    # Authentication / Identity
    JWT_SECRET: PLACEHOLDER_SEAL_WITH_KUBESEAL
    KEYCLOAK_CLIENT_SECRET: PLACEHOLDER_SEAL_WITH_KUBESEAL
    KEYCLOAK_ADMIN_PASSWORD: PLACEHOLDER_SEAL_WITH_KUBESEAL

    # Object Storage (MinIO / S3)
    S3_ACCESS_KEY: PLACEHOLDER_SEAL_WITH_KUBESEAL
    S3_SECRET_KEY: PLACEHOLDER_SEAL_WITH_KUBESEAL
    S3_ENDPOINT: PLACEHOLDER_SEAL_WITH_KUBESEAL

  # Template controls the resulting Kubernetes Secret's shape.
  template:
    metadata:
      name: ai-tutor-secrets
      namespace: opsera-ai-tutor-dev
      labels:
        app: ai-tutor
        managed-by: sealed-secrets
        environment: dev
      annotations:
        # Trigger a rollout restart of all pods when the secret is rotated.
        # CI/CD should run: kubectl rollout restart deployment -n opsera-ai-tutor-dev
        # after applying an updated SealedSecret.
        reloader.stakater.com/match: "true"
    type: Opaque
