apiVersion: apps/v1
kind: Deployment
metadata:
  name: content-ingestion
  labels:
    app.kubernetes.io/name: ai-tutor
    app.kubernetes.io/component: content-ingestion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: content-ingestion
  template:
    metadata:
      labels:
        app: content-ingestion
        app.kubernetes.io/name: ai-tutor
        app.kubernetes.io/component: content-ingestion
    spec:
      serviceAccountName: ai-tutor
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: content-ingestion
          image: PLACEHOLDER_ECR_URI_CONTENT_INGESTION
          ports:
            - containerPort: 8003
          envFrom:
            - configMapRef:
                name: ai-tutor-config
            - secretRef:
                name: ai-tutor-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 30
            periodSeconds: 30
