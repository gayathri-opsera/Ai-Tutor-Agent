apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-tutor-frontend
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "500m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "120"
  labels:
    app.kubernetes.io/name: ai-tutor
    environment: dev
spec:
  ingressClassName: nginx
  rules:
    - host: ai-tutor-dev.agent.opsera.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 8080
          - path: /api/internal/llm
            pathType: Prefix
            backend:
              service:
                name: llm-gateway
                port:
                  number: 8000
          - path: /api/internal/rag
            pathType: Prefix
            backend:
              service:
                name: rag-pipeline
                port:
                  number: 8002
          - path: /api/internal/agent
            pathType: Prefix
            backend:
              service:
                name: agent-reasoning
                port:
                  number: 8005
          - path: /api/v1/knowledge-bases
            pathType: Prefix
            backend:
              service:
                name: content-management
                port:
                  number: 8007
          - path: /api/v1/content
            pathType: Prefix
            backend:
              service:
                name: content-ingestion
                port:
                  number: 8003
          - path: /api/v1/chat
            pathType: Prefix
            backend:
              service:
                name: chat-orchestrator
                port:
                  number: 8004
          - path: /api/v1/learner
            pathType: Prefix
            backend:
              service:
                name: learner-profile
                port:
                  number: 8008
          - path: /api/v1/admin
            pathType: Prefix
            backend:
              service:
                name: admin-config
                port:
                  number: 8009
          - path: /api/v1/assessments
            pathType: Prefix
            backend:
              service:
                name: assessment
                port:
                  number: 8010
          - path: /api/v1/analytics
            pathType: Prefix
            backend:
              service:
                name: analytics
                port:
                  number: 8011
