apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-tutor-frontend
  annotations:
    kubernetes.io/ingress.class: nginx
  labels:
    app.kubernetes.io/name: ai-tutor
    environment: dev
spec:
  ingressClassName: nginx
  rules:
    - host: ai-tutor-dev.agent.opsera.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 8080
          - path: /api/llm
            pathType: Prefix
            backend:
              service:
                name: llm-gateway
                port:
                  number: 8000
          - path: /api/rag
            pathType: Prefix
            backend:
              service:
                name: rag-pipeline
                port:
                  number: 8002
          - path: /api/chat
            pathType: Prefix
            backend:
              service:
                name: chat-orchestrator
                port:
                  number: 8004
          - path: /api/agent
            pathType: Prefix
            backend:
              service:
                name: agent-reasoning
                port:
                  number: 8005
          - path: /api/content
            pathType: Prefix
            backend:
              service:
                name: content-management
                port:
                  number: 8007
          - path: /api/learner
            pathType: Prefix
            backend:
              service:
                name: learner-profile
                port:
                  number: 8008
          - path: /api/admin
            pathType: Prefix
            backend:
              service:
                name: admin-config
                port:
                  number: 8009
          - path: /api/assessment
            pathType: Prefix
            backend:
              service:
                name: assessment
                port:
                  number: 8010
          - path: /api/analytics
            pathType: Prefix
            backend:
              service:
                name: analytics
                port:
                  number: 8011
