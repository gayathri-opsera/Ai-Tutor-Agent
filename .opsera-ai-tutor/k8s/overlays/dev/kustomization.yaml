apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: opsera-ai-tutor-dev

resources:
  - ../../base
  - namespace.yaml
  - ingress.yaml

labels:
  - pairs:
      environment: dev
      tenant: opsera
    includeSelectors: false

replicas:
  - name: frontend
    count: 1
  - name: llm-gateway
    count: 1
  - name: embedding-service
    count: 1
  - name: rag-pipeline
    count: 1
  - name: content-ingestion
    count: 1
  - name: chat-orchestrator
    count: 1
  - name: agent-reasoning
    count: 1
  - name: confidence-grader
    count: 1
  - name: content-management
    count: 1
  - name: learner-profile
    count: 1
  - name: admin-config
    count: 1
  - name: assessment
    count: 1
  - name: analytics
    count: 1
  - name: audit
    count: 1

# Per-service image patches — each service CI/CD writes ONLY its own file.
# This prevents merge conflicts when multiple pipelines run concurrently.
patches:
  - path: frontend-image.yaml
    target:
      kind: Deployment
      name: frontend
  - path: llm-gateway-image.yaml
    target:
      kind: Deployment
      name: llm-gateway
  - path: embedding-service-image.yaml
    target:
      kind: Deployment
      name: embedding-service
  - path: rag-pipeline-image.yaml
    target:
      kind: Deployment
      name: rag-pipeline
  - path: content-ingestion-image.yaml
    target:
      kind: Deployment
      name: content-ingestion
  - path: chat-orchestrator-image.yaml
    target:
      kind: Deployment
      name: chat-orchestrator
  - path: agent-reasoning-image.yaml
    target:
      kind: Deployment
      name: agent-reasoning
  - path: confidence-grader-image.yaml
    target:
      kind: Deployment
      name: confidence-grader
  - path: content-management-image.yaml
    target:
      kind: Deployment
      name: content-management
  - path: learner-profile-image.yaml
    target:
      kind: Deployment
      name: learner-profile
  - path: admin-config-image.yaml
    target:
      kind: Deployment
      name: admin-config
  - path: assessment-image.yaml
    target:
      kind: Deployment
      name: assessment
  - path: analytics-image.yaml
    target:
      kind: Deployment
      name: analytics
  - path: audit-image.yaml
    target:
      kind: Deployment
      name: audit
