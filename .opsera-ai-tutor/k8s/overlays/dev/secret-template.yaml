#
# GitHub Secrets required (set at repo or org level):
#   OPENAI_API_KEY
#   ANTHROPIC_API_KEY
#   GROQ_API_KEY
#   DB_HOST
#   DB_PASSWORD
#   DATABASE_URL
#   REDIS_URL
#   WEAVIATE_URL
#   JWT_SECRET
#   KEYCLOAK_CLIENT_SECRET
#   KEYCLOAK_ADMIN_PASSWORD
#   S3_ACCESS_KEY
#   S3_SECRET_KEY
