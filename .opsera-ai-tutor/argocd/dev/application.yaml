apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opsera-ai-tutor-dev
  namespace: argocd
  labels:
    app.kubernetes.io/name: ai-tutor
    environment: dev
    tenant: opsera
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/gayathri-opsera/Ai-Tutor-Agent.git
    targetRevision: main
    path: .opsera-ai-tutor/k8s/overlays/dev
  destination:
    name: opsera-usw2-np
    namespace: opsera-ai-tutor-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
